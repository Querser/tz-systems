name: tz-systems

services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3001"
    volumes:
      - ./database:/app/database
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      shared_proxy:
        aliases:
          - tz-systems-app

networks:
  shared_proxy:
    external: true
    name: stunt-website_default
