<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Portfolio Admin — Вход</title>
    <script src="/admin/admin-bootstrap.js"></script>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body class="admin-body admin-login-page" data-admin-page="login">
    <div class="admin-preloader" id="admin-preloader" aria-live="polite" aria-label="Загрузка панели">
      <div class="admin-preloader-core">
        <div class="admin-preloader-heading">
          <span>PORTFOLIO_ADMIN</span>
          <strong id="admin-preloader-percentage">0%</strong>
        </div>
        <div class="admin-preloader-track" aria-hidden="true">
          <span id="admin-preloader-progress"></span>
        </div>
        <p class="admin-preloader-status" id="admin-preloader-status">Инициализация защищённого контура</p>
        <div class="admin-preloader-log" id="admin-preloader-log" aria-hidden="true"></div>
      </div>
    </div>

    <main class="login-shell">
      <section class="admin-panel login-panel" aria-labelledby="login-title">
        <p class="admin-kicker">secure.channel / authentication</p>
        <h1 id="login-title">admin</h1>
        <p class="admin-muted">Введите пароль</p>

        <form class="admin-form" id="login-form">
          <label class="admin-field">
            <span>Пароль</span>
            <input
              id="admin-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              autofocus
            />
          </label>
          <button class="admin-button admin-button-primary" type="submit">Войти</button>
        </form>

        <p class="admin-message" id="login-message" role="status" aria-live="polite"></p>
        <a class="admin-back-link" href="/">← Вернуться на сайт</a>
      </section>
    </main>
    <script type="module" src="/admin/admin.js"></script>
  </body>
</html>
