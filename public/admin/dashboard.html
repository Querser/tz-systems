<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Portfolio Admin — Проекты</title>
    <script src="/admin/admin-bootstrap.js"></script>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body class="admin-body" data-admin-page="dashboard">
    <div class="admin-preloader" id="admin-preloader" aria-live="polite" aria-label="Загрузка панели">
      <div class="admin-preloader-core">
        <div class="admin-preloader-heading">
          <span>PORTFOLIO_ADMIN</span>
          <strong id="admin-preloader-percentage">0%</strong>
        </div>
        <div class="admin-preloader-track" aria-hidden="true">
          <span id="admin-preloader-progress"></span>
        </div>
        <p class="admin-preloader-status" id="admin-preloader-status">Инициализация защищённого контура</p>
        <div class="admin-preloader-log" id="admin-preloader-log" aria-hidden="true"></div>
      </div>
    </div>

    <header class="admin-header">
      <a class="admin-brand" href="/admin/dashboard.html">
        <span>TZ</span>
        <strong>Portfolio Admin</strong>
      </a>
      <nav class="admin-header-actions" aria-label="Действия администратора">
        <a class="admin-button" href="/" target="_blank" rel="noreferrer">Открыть сайт</a>
        <button class="admin-button" id="logout-button" type="button">Выйти</button>
      </nav>
    </header>

    <main class="admin-dashboard">
      <section class="admin-panel project-list-panel" aria-labelledby="projects-heading">
        <div class="admin-section-heading">
          <div>
            <p class="admin-kicker">database/projects</p>
            <h1 id="projects-heading">Проекты</h1>
          </div>
          <button class="admin-button admin-button-primary" id="new-project-button" type="button">
            Добавить проект
          </button>
        </div>
        <div class="admin-project-list" id="admin-project-list" aria-live="polite"></div>
      </section>

      <section class="admin-panel project-form-panel" aria-labelledby="form-heading">
        <div class="admin-section-heading">
          <div>
            <p class="admin-kicker">project.editor</p>
            <h2 id="form-heading">Новый проект</h2>
          </div>
        </div>

        <form class="admin-form project-form" id="project-form">
          <div class="admin-form-grid">
            <label class="admin-field">
              <span>Название — RU *</span>
              <input id="title-ru" name="titleRu" type="text" maxlength="180" required />
            </label>
            <label class="admin-field">
              <span>Название — EN</span>
              <input id="title-en" name="titleEn" type="text" maxlength="180" />
            </label>
          </div>

          <label class="admin-field">
            <span>Полное описание — RU *</span>
            <textarea id="description-ru" name="descriptionRu" rows="5" maxlength="5000" required></textarea>
          </label>
          <label class="admin-field">
            <span>Полное описание — EN</span>
            <textarea id="description-en" name="descriptionEn" rows="5" maxlength="5000"></textarea>
          </label>

          <label class="admin-field">
            <span>Стек</span>
            <input
              id="project-stack"
              name="stack"
              type="text"
              placeholder="Python, FastAPI, PostgreSQL"
            />
          </label>

          <section class="admin-upload-field" aria-labelledby="screenshots-label">
            <div class="admin-upload-heading">
              <div>
                <span id="screenshots-label">Скриншоты проекта</span>
                <small>JPEG, PNG или WebP. До 8 МБ на файл, максимум 20 новых файлов за раз.</small>
              </div>
              <label class="admin-upload-button" for="project-screenshots">
                Выбрать изображения
                <input
                  class="admin-file-input"
                  id="project-screenshots"
                  name="screenshots"
                  type="file"
                  accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
                  multiple
                />
              </label>
            </div>
            <div
              class="admin-screenshot-previews"
              id="project-screenshot-previews"
              aria-live="polite"
            ></div>
          </section>

          <div class="admin-form-actions">
            <button class="admin-button admin-button-primary" id="save-project-button" type="submit">
              Добавить проект
            </button>
            <button class="admin-button" id="cancel-edit-button" type="button" hidden>
              Отменить редактирование
            </button>
          </div>
        </form>

        <p class="admin-message" id="dashboard-message" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script type="module" src="/admin/admin.js"></script>
  </body>
</html>
